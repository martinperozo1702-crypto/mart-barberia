<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Martin Perozo — Barbero Profesional</title>
  <link rel="icon" type="image/png" href="img/logo-metalico.png">
  <link rel="apple-touch-icon" href="img/logo-metalico.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Rajdhani:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #0a0a0a;
      --dark: #111111;
      --surface: #161616;
      --border: rgba(180, 170, 155, 0.15);
      --border-hover: rgba(200, 190, 175, 0.35);
      --silver: #c8c0b0;
      --silver-bright: #e8e0d0;
      --silver-dim: #7a7268;
      --text-muted: #4a4540;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background-color: #0a0a0a;
      color: var(--silver);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at top, #1a1a1a 0%, #0a0a0a 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(45deg,
          transparent,
          transparent 2px,
          rgba(180, 170, 155, 0.06) 2px,
          rgba(180, 170, 155, 0.06) 4px);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      width: 100%;
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      text-align: center;
      padding: 30px 0 20px;
    }

    .logo-mark {
      width: 330px;
      height: 330px;
      margin: 0 auto -40px;
      position: relative;
    }

    .logo-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }


    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 8vw, 3.2rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--silver-bright);
      line-height: 1;
      margin-bottom: 8px;
    }

    .title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--silver-dim);
      margin-bottom: 4px;
    }

    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--silver-dim);
      letter-spacing: 0.02em;
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 12px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
    }

    .divider-dot {
      width: 4px;
      height: 4px;
      background: var(--silver-dim);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ── Services ── */
    .services {
      display: flex;
      gap: 24px;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
    }

    .service-item {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--silver-dim);
    }

    .service-sep {
      width: 3px;
      height: 3px;
      background: var(--text-muted);
      border-radius: 50%;
    }

    /* ── Links ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 48px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 2px;
      text-decoration: none;
      color: var(--silver);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--silver-dim);
      transform: scaleY(0);
      transition: transform 0.25s ease;
      transform-origin: bottom;
    }

    .link-btn:hover {
      border-color: var(--border-hover);
      background: #1c1c1c;
      color: var(--silver-bright);
    }

    .link-btn:hover::before {
      transform: scaleY(1);
    }

    .link-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      opacity: 0.7;
      transition: opacity 0.25s ease;
    }

    .link-btn:hover .link-icon {
      opacity: 1;
    }

    .link-label {
      flex: 1;
    }

    .link-arrow {
      font-size: 0.85rem;
      opacity: 0.3;
      transition: all 0.25s ease;
    }

    .link-btn:hover .link-arrow {
      opacity: 0.7;
      transform: translateX(3px);
    }

    /* ── Footer ── */
    .footer {
      width: 100%;
      text-align: center;
      padding: 0 0 48px;
    }

    .footer-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      animation: fadeUp 0.7s ease both;
    }

    .divider {
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .services {
      animation: fadeUp 0.7s 0.3s ease both;
    }

    .links {
      animation: fadeUp 0.7s 0.4s ease both;
    }

    .footer {
      animation: fadeUp 0.7s 0.6s ease both;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(45deg,
          transparent,
          transparent 2px,
          rgba(180, 170, 155, 0.06) 2px,
          rgba(180, 170, 155, 0.06) 4px);
      pointer-events: none;
      z-index: 0;
    }

    .cta {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.15em;
      color: var(--silver-bright);
      margin-top: 10px;
      opacity: 1;
    }

    .horarios {
      text-align: center;
      margin-bottom: 32px;
    }

    .horario-titulo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--silver);
      margin-bottom: 6px;
    }

    .horario-texto {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--silver-bright);
    }
  </style>
